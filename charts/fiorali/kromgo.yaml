name: kromgo
namespace: monitoring
deployment:
  enabled: true
replicaCount: 2
strategyType: RollingUpdate
image:
  repository: ghcr.io/kashalls/kromgo
  tag: latest@sha256:965ecc92d68dc1a4a969397855367bbc70da03227a941ea607b73bb7e0b78fd6
containerPorts:
- containerPort: 8080
  name: kromgo
  protocol: TCP
- containerPort: 8888
  name: healthz
  protocol: TCP
resources:
  limits:
    cpu: 500m
    memory: 500Mi
  requests:
    cpu: 250m
    memory: 250Mi
probes:
  httpGet:
    path: /healthz
    port: healthz
service:
  enabled: true
  ports:
  - name: kromgo
    port: 8080
    protocol: TCP
    targetPort: kromgo
env:
- name: PROMETHEUS_URL
  value: "http://prometheus-kube-prometheus-prometheus:9090"
ingress:
  enabled: true
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  privileged: false
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
networkpolicy:
  ingress:
    internal: true
volumeMounts:
- name: kromgo-configmap
  mountPath: /kromgo/config.yaml
  subPath: config.yaml
  readOnly: true
volumes:
- name: kromgo-configmap
  configMap:
    name: kromgo-configmap
    defaultMode: 511
imageUpdater:
  enabled: true
configMap:
  enabled: true
  value: |-
    config.yaml: |
      ---
      # yaml-language-server: $schema=https://raw.githubusercontent.com/kashalls/kromgo/main/config.schema.json
      badge:
        font: Verdana.ttf # Relative to /kromgo - Verdana.ttf is available in the container
        size: 12
      metrics:
        # - name: longhorn_volume_state
        #   query: longhorn_volume_state{}
        #   colors:
        #     - { valueOverride: 'Healthy', color: "green", min: 2, max: 2 }
        #     - { valueOverride: 'Degraded', color: "red", min: 0, max: 1 }
        #     - { valueOverride: 'Unmounted', color: "orange", min: 3, max: 3 }
        - name: kubernetes_version
          query: kubernetes_build_info{service="kubernetes"}
          label: git_version
        - name: argocd_version
          query: argocd_info{}
          label: version
        - name: cluster_uptime_days
          query: ceil(avg(node_time_seconds - node_boot_time_seconds)/60/60/24)
          suffix: "d"
          colors:
            - color: "green"
              min: 0
              max: 100
        - name: cluster_node_count
          query: count(count by (node) (kube_node_info))
          colors:
            - color: "green"
              min: 0
              max: 100
        - name: cluster_pod_count
          query: sum(kube_pod_status_phase{phase="Running"})
          colors:
            - color: "green"
              min: 0
              max: 1000
        - name: cluster_cpu_usage
          query: "round(cluster:node_cpu:ratio_rate5m * 100, 0.1)"
          suffix: "%"
          colors:
            - color: "green"
              min: 0
              max: 50
            - color: "orange"
              min: 51
              max: 75
            - color: "red"
              min: 76
              max: 1000
        - name: cluster_memory_usage
          query: "round(sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)*100, 0.1)"
          suffix: "%"
          colors:
            - color: "green"
              min: 0
              max: 50
            - color: "orange"
              min: 51
              max: 75
            - color: "red"
              min: 76
              max: 1000
        - name: cluster_power_usage
          query: unpoller_device_outlet_ac_power_consumption{}
          suffix: "W"
          colors:
          - color: "green"
            min: 0
            max: 260
          - color: "red"
            min: 261
            max: 1000
        - name: cluster_popeye_score
          query: popeye_report_score{}
          suffix: "%"
          colors:
            - color: "red"
              min: 0
              max: 99
            - color: "green"
              min: 100
              max: 1000

        - name: home_assistant_uptime
          query: round(sum(increase(gatus_results_total{key="home-security_home-assistant", success="true"}[7d])) / sum(increase(gatus_results_total{key="home-security_home-assistant"}[7d])) * 100, 0.1)
          suffix: "%"
          colors:
            - color: "green"
              min: 99
              max: 100
            - color: "orange"
              min: 95
              max: 98.99
            - color: "red"
              min: 0
              max: 94.99
        - name: home_assistant_response_time
          query: round(avg_over_time(gatus_results_duration_seconds{key="home-security_home-assistant"}[24h]) * 1000, 0.1)
          suffix: "ms"
          colors:
            - color: "green"
              min: 0
              max: 150
            - color: "orange"
              min: 151
              max: 400
            - color: "red"
              min: 401
              max: 999999

        - name: scrypted_uptime
