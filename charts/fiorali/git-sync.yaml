name: git-sync
namespace: monitoring
image:
  repository: docker.io/alpine/git
  tag: latest@sha256:fac7bc2c12aa52bff1c78a26359990e149954a60cdd5d6e20e7e009666c73e0a
deployment:
  enabled: false
resources:
  limits:
    cpu: 500m
    memory: 500Mi
  requests:
    cpu: 250m
    memory: 250Mi
service:
  enabled: false
podDisruptionBudget:
  enabled: false
command:
  exec: ["/bin/sh", "-c", "/git-sync.sh"]
  # exec: ["/bin/sh", "-c", "sleep 1000000"]
cronjob:
  enabled: true
  schedule: "5 23 * * *"
env:
- name: KROMGO_QUERIES
  value: "kubernetes_version,argocd_version,cluster_uptime_days,cluster_node_count,cluster_pod_count,cluster_cpu_usage,cluster_memory_usage,cluster_power_usage,cluster_popeye_score,home_assistant_uptime,scrypted_uptime,argocd_uptime,longhorn_uptime,plex_uptime,plex_lb_uptime,plex_remote_uptime,prowlarr_uptime,radarr_uptime,sonarr_uptime,tautulli_uptime,transmission_uptime,grafana_uptime,kromgo_uptime,prometheus_uptime,dawarich_uptime,emulatorjs_uptime,influxdb_uptime,linkding_uptime,sillytavern_uptime,speedtest_uptime,media-management_plex,media-management_prowlarr,media-management_radarr,media-management_sonarr,media-management_tautulli,media-management_transmission,kubernetes-core_argo,kubernetes-core_longhorn,monitoring_grafana-oss,monitoring_kromgo,home-security_scrypted,home-security_home-assistant,other_dawarich,other_emulatorjs,other_influxdb,other_linkding,other_sillytavern,other_speedtest"
- name: GITHUB_PAT
  valueFrom:
    secretKeyRef:
      name: github-pat
      key: GITHUB_PAT
volumeMounts:
- name: git
  mountPath: /git
- name: git-sync-configmap
  mountPath: /git-sync.sh
  subPath: git-sync.sh
  readOnly: true
volumes:
- name: git-sync-configmap
  configMap:
    name: git-sync-configmap
    defaultMode: 511
- name: git
  emptyDir: {}
networkpolicy:
  ingress:
    internet: true
  egress:
    internet: true
    internal: true
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  privileged: false
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
configMap:
  enabled: true
  value: |-
    git-sync.sh: |
      #!/bin/sh
      set -x
      echo "Cloning git repository"
      git clone --depth 5 "https://jaredfiorali:$GITHUB_PAT@github.com/jaredfiorali/infrastructure.git" --single-branch --branch=gh-pages
      cd /git/infrastructure

      # Set the IFS to comma
      IFS=','
      echo "Downloading metrics"
      for query in $KROMGO_QUERIES; do
          wget -O "$query.json" "http://kromgo.monitoring:8080/$query"
      done

      # Gatus response-time charts: derived from KROMGO_QUERIES entries ending in _response_time
      # Assumes kromgo metric names match Gatus endpoint keys exactly (e.g. media-management_plex_response_time)
      GATUS_URL="${GATUS_URL:-http://gatus.gatus:8080}"
      mkdir -p badges
      echo "Downloading Gatus response-time charts"
      IFS=','
      for query in $KROMGO_QUERIES; do
          case "$query" in
              *_uptime|*_version|cluster_*)
                  echo "Skipping $query (not a chart source)"
                  ;;
              *)
                  echo "Fetching chart for $query"
                  wget -O "badges/${query}-chart.svg" "$GATUS_URL/api/v1/endpoints/${query}/response-times/30d/chart.svg"
                  ;;
          esac
      done

      git config user.email "jaredfiorali@gmail.com"
      git config user.name "Jared Fiorali"
      echo "Commit metrics to git"
      git add . && git commit -m "Metrics update"
      echo "Push new metrics"
      git push
imageUpdater:
  enabled: true
externalSecrets:
- name: github-pat
  data:
  - secretKey: GITHUB_PAT
    remoteRef:
      key: /homelab/git-sync/GITHUB_PAT
