name: git-sync
namespace: monitoring
image:
  repository: docker.io/alpine/git
  tag: latest@sha256:fac7bc2c12aa52bff1c78a26359990e149954a60cdd5d6e20e7e009666c73e0a
deployment:
  enabled: false
resources:
  limits:
    cpu: 500m
    memory: 500Mi
  requests:
    cpu: 250m
    memory: 250Mi
service:
  enabled: false
podDisruptionBudget:
  enabled: false
command:
  exec: ["/bin/sh", "-c", "/git-sync.sh"]
  # exec: ["/bin/sh", "-c", "sleep 1000000"]
cronjob:
  enabled: true
  schedule: "5 23 * * *"
env:
- name: KROMGO_QUERIES
  value: "kubernetes_version,argocd_version,cluster_uptime_days,cluster_node_count,cluster_pod_count,cluster_cpu_usage,cluster_memory_usage,cluster_power_usage,cluster_popeye_score,home_assistant_uptime,home_assistant_response_time,scrypted_uptime,scrypted_response_time,argocd_uptime,argocd_response_time,longhorn_uptime,longhorn_response_time,plex_uptime,plex_lb_uptime,plex_response_time,plex_remote_uptime,plex_remote_response_time,prowlarr_uptime,prowlarr_response_time,radarr_uptime,radarr_response_time,sonarr_uptime,sonarr_response_time,tautulli_uptime,tautulli_response_time,transmission_uptime,transmission_response_time,grafana_uptime,grafana_response_time,kromgo_uptime,kromgo_response_time,prometheus_uptime,prometheus_response_time,dawarich_uptime,dawarich_response_time,emulatorjs_uptime,emulatorjs_response_time,influxdb_uptime,influxdb_response_time,linkding_uptime,linkding_response_time,sillytavern_uptime,sillytavern_response_time,speedtest_uptime,speedtest_response_time"
- name: GATUS_BADGES
  value: "media-management_plex,uptime,7d;home-security_home-assistant,health,na;kubernetes-core_argo,response-time-chart,24h;kubernetes-core_longhorn,uptime,30d"
- name: GITHUB_PAT
  valueFrom:
    secretKeyRef:
      name: github-pat
      key: GITHUB_PAT
volumeMounts:
- name: git
  mountPath: /git
- name: git-sync-configmap
  mountPath: /git-sync.sh
  subPath: git-sync.sh
  readOnly: true
volumes:
- name: git-sync-configmap
  configMap:
    name: git-sync-configmap
    defaultMode: 511
- name: git
  emptyDir: {}
networkpolicy:
  ingress:
    internet: true
  egress:
    internet: true
    internal: true
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  privileged: false
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
configMap:
  enabled: true
  value: |-
    git-sync.sh: |
      #!/bin/sh
      set -x
      echo "Cloning git repository"
      git clone --depth 5 "https://jaredfiorali:$GITHUB_PAT@github.com/jaredfiorali/infrastructure.git" --single-branch --branch=gh-pages
      cd /git/infrastructure

      # Set the IFS to comma
      IFS=','
      echo "Downloading metrics"
      for query in $KROMGO_QUERIES; do
          wget -O "$query.json" "http://kromgo.monitoring:8080/$query"
      done

      # Gatus badges: semicolon-separated entries, each entry is key,type,duration
      # type: health | uptime | response-time-badge | response-time-chart
      # duration: 1h | 24h | 7d | 30d (ignored for type=health)
      # Example: GATUS_BADGES="media-management_plex,uptime,7d;home-assistant_home-assistant,health,kubernetes-core_argo,response-time-chart,24h"
      GATUS_URL="${GATUS_URL:-http://gatus.gatus:8080}"
      mkdir -p badges
      echo "Downloading Gatus badges"
      OLD_IFS="$IFS"
      IFS=';'
          for entry in $GATUS_BADGES; do
        key=$(echo "$entry" | cut -d',' -f1)
        type=$(echo "$entry" | cut -d',' -f2)
        duration=$(echo "$entry" | cut -d',' -f3)

        case "$type" in
            health)
                path="health/badge.svg"
                ;;
            uptime)
                path="uptimes/$duration/badge.svg"
                ;;
            response-time-badge)
                path="response-times/$duration/badge.svg"
                ;;
            response-time-chart)
                path="response-times/$duration/chart.svg"
                ;;
            *)
                echo "Unknown badge type: $type, skipping $key"
                continue
                ;;
        esac

        wget -O "badges/${key}-${type}-${duration}.svg" "$GATUS_URL/api/v1/endpoints/$key/$path"
      done

      git config user.email "jaredfiorali@gmail.com"
      git config user.name "Jared Fiorali"
      echo "Commit metrics to git"
      git add . && git commit -m "Metrics update"
      echo "Push new metrics"
      git push
imageUpdater:
  enabled: true
externalSecrets:
- name: github-pat
  data:
  - secretKey: GITHUB_PAT
    remoteRef:
      key: /homelab/git-sync/GITHUB_PAT
