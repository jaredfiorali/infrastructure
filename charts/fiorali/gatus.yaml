name: gatus
namespace: gatus
deployment:
  enabled: true
replicaCount: 1
strategyType: RollingUpdate
image:
  repository: ghcr.io/twin/gatus
  tag: latest@sha256:ef87c00b0bfd4fcd57bf86f704f5c773747bf8bee0c67a3934eb3f11795b40c9
containerPorts:
  - containerPort: 8080
    name: gatus
    protocol: TCP
resources:
  limits:
    cpu: 250m
    memory: 50Mi
  requests:
    cpu: 100m
    memory: 25Mi
probes:
  httpGet:
    path: /
    port: gatus
initContainers:
  enabled: true
  containers:
  - name: gatus-init
    image: docker.io/alpine/curl:latest
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsUser: 911
    resources:
      limits:
        cpu: 25m
        memory: 25Mi
      requests:
        cpu: 10m
        memory: 10Mi
    env:
    - name: SLACK_WEBHOOK_URL
      valueFrom:
        secretKeyRef:
          name: gatus-credentials
          key: SLACK_WEBHOOK_URL
    - name: POSTGRES_CONNECTION_STRING
      valueFrom:
        secretKeyRef:
          name: gatus-credentials
          key: POSTGRES_CONNECTION_STRING
    command:
    - sh
    - -c
    - |
      cd /tmp
      curl -L https://github.com/a8m/envsubst/releases/download/v1.4.3/envsubst-Linux-arm64 -o envsubst
      chmod +x envsubst
      # Process all config files with environment variable substitution
      ./envsubst < /tmp/config.yaml > /config/config.yaml
      echo "Config files processed successfully"
      echo "Processed files:"
      ls -la /config/config.yaml
    volumeMounts:
    - name: config
      mountPath: /config
    - name: tmp
      mountPath: /tmp
    - name: gatus-configmap
      mountPath: /tmp/config.yaml
      subPath: config.yaml
      readOnly: true
service:
  enabled: true
  ports:
    - name: gatus
      port: 8080
      protocol: TCP
      targetPort: gatus
volumeMounts:
- name: config
  mountPath: /config
volumes:
- name: config
  emptyDir: {}
- name: tmp
  emptyDir: {}
- name: gatus-configmap
  configMap:
    name: gatus-configmap
    defaultMode: 511
networkpolicy:
  ingress:
    internal: true
  egress:
    allowAll: true # For env substitution and Slack alerting
ingress:
  enabled: true
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_RAW
  readOnlyRootFilesystem: true
  privileged: false
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
imageUpdater:
  enabled: true
externalSecrets:
- name: gatus-credentials
  data:
  - secretKey: SLACK_WEBHOOK_URL
    remoteRef:
      key: /homelab/gatus/SLACK_WEBHOOK_URL
  - secretKey: POSTGRES_CONNECTION_STRING
    remoteRef:
      key: /homelab/gatus/POSTGRES_CONNECTION_STRING
serviceMonitor:
  enabled: true
  appSelector: gatus
  port: "gatus"
configMap:
  enabled: true
  value: |-
    config.yaml: |
      metrics: true
      alerting:
        slack:
          webhook-url: "${SLACK_WEBHOOK_URL}"
          default-alert:
            enabled: true
            failure-threshold: 3
            success-threshold: 2
            send-on-resolved: true
            description: "Gatus check failed"
      storage:
        type: postgres
        path: "${POSTGRES_CONNECTION_STRING}"
      connectivity:
        checker:
          target: 1.1.1.1:53
          interval: 60s
      endpoints:
        - name: argo
          url: http://argo.fiora.li
          group: kubernetes core
          interval: 1m
          conditions:
            - "[STATUS] == 200"
            - "[RESPONSE_TIME] < 500"
