name: alloy
namespace: loki
deployment:
  enabled: false
service:
  enabled: false
networkpolicy:
  enabled: false
serviceAccount:
  enabled: false
podDisruptionBudget:
  enabled: false
ingress:
  enabled: false
containerSecurityContext:
  enabled: false
configMap:
  enabled: true
  value: |-
    config.alloy: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      // Loki write endpoint
      loki.write "fiorali" {
        endpoint {
          url       = "http://loki-gateway.loki/loki/api/v1/push"
          tenant_id = "fiorali"
        }
      }

      // Kubernetes discovery (Filtering to only this Node)
      discovery.kubernetes "pods" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + coalesce(env("HOSTNAME"), constants.hostname)
        }
      }

      // Map standard labels
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
      }

      // Stream logs via Kubernetes API — handles rotation, symlinks, path construction natively
      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        forward_to = [loki.write.fiorali.receiver]

        // 1. Parse JSON if the app logs in JSON
        stage.json {
          expressions = {
            level = "level",
            msg   = "message",
          }
        }

        // 2. Set level label (falls back to empty if JSON parsing didn't find it)
        stage.labels {
          values = {
            level = "level",
          }
        }

        stage.static_labels {
          values = {
            cluster     = "default",
            environment = "prod",
          }
        }
      }
