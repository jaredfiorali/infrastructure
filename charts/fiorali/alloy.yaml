name: alloy
namespace: loki
deployment:
  enabled: false
service:
  enabled: false
networkpolicy:
  egress:
    internal: true
  ingress:
    internal: true
    namespaces:
      - monitoring
serviceAccount:
  enabled: false
podDisruptionBudget:
  enabled: false
ingress:
  enabled: true
  portName: http-metrics
containerSecurityContext:
  enabled: false
configMap:
  enabled: true
  value: |-
    config.alloy: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      // Loki write endpoint
      loki.write "fiorali" {
        endpoint {
          url       = "http://loki-gateway.loki/loki/api/v1/push"
          tenant_id = "fiorali"
        }
      }

      // Kubernetes discovery (Filtering to only this Node)
      discovery.kubernetes "pods" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + coalesce(env("HOSTNAME"), constants.hostname)
        }
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // 1. Map standard labels
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        // 2. Build the directory string: namespace_podname_uid
        rule {
          source_labels = [
            "__meta_kubernetes_namespace",
            "__meta_kubernetes_pod_name",
            "__meta_kubernetes_pod_uid",
          ]
          separator    = "_"
          target_label = "tmp_folder"
        }

        // 3. Final Path Construction
        rule {
          source_labels = ["tmp_folder", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          replacement   = "/var/log/pods/$1$2/0.log"
          target_label  = "__path__"
        }
      }

      loki.source.file "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
        // Critical for RPi/Busy clusters to avoid 400 errors
        tail_from_end = true
      }

      loki.process "pod_logs" {
        forward_to = [loki.write.fiorali.receiver]

        // 1. Parse the CRI format
        // This extracts the real timestamp and removes the "stdout F" junk
        stage.cri {}

        // 2. (Optional) Parse JSON if the app logs in JSON
        // If emulatorjs logs look like {"level":"info", "msg":"..."},
        // this will turn those into searchable labels.
        stage.json {
          expressions = {
            level  = "level",
            msg    = "message",
          }
        }

        // 3. Set a fallback level if JSON parsing fails
        stage.labels {
          values = {
            level = "level",
          }
        }

        stage.static_labels {
          values = {
            cluster     = "default",
            environment = "prod",
          }
        }
      }
