name: sillytavern
namespace: sillytavern
deployment:
  enabled: true
image:
  repository: ghcr.io/sillytavern/sillytavern
  tag: latest@sha256:5520831198cdb30ede4ae6c481a5a36257d4e9e3177512d6e28d0c7bb1c9e76f
containerPorts:
- containerPort: 8000
  name: sillytavern
  protocol: TCP
resources:
  limits:
    cpu: 2
    memory: 1Gi
  requests:
    cpu: 1
    memory: 500Mi
probes:
  exec:
    command:
    - sh
    - -c
    - node src/healthcheck.js
service:
  enabled: true
  ports:
  - name: sillytavern
    port: 8000
    protocol: TCP
    targetPort: sillytavern
env:
- name: NODE_ENV
  value: production
- name: FORCE_COLOR
  value: '1'
- name: SILLYTAVERN_LISTEN
  value: 'true'
- name: SILLYTAVERN_WHITELISTMODE
  value: 'false'
- name: SILLYTAVERN_BACKUPS_CHAT_ENABLED
  value: 'false'
- name: SILLYTAVERN_THUMBNAILS_ENABLED
  value: 'false'
- name: SILLYTAVERN_EXTENSIONS_ENABLED
  value: 'false'
- name: SILLYTAVERN_ENABLESERVERPLUGINS
  value: 'false'
- name: SILLYTAVERN_LOGGING_ENABLEACCESSLOG
  value: 'false'
- name: SILLYTAVERN_LOGGING_MINLOGLEVEL
  value: '3'
- name: SILLYTAVERN_HEARTBEATINTERVAL
  value: '15'
- name: SILLYTAVERN_BROWSERLAUNCH_ENABLED
  value: 'false'
- name: SILLYTAVERN_BASICAUTHMODE
  value: 'true'
- name: SILLYTAVERN_BASICAUTHUSER_USERNAME
  valueFrom:
    secretKeyRef:
      name: sillytavern-credentials
      key: BASICAUTHUSER_USERNAME
- name: SILLYTAVERN_BASICAUTHUSER_PASSWORD
  valueFrom:
    secretKeyRef:
      name: sillytavern-credentials
      key: BASICAUTHUSER_PASSWORD
- name: SILLYTAVERN_DATAROOT
  value: '/app/data'
- name: SILLYTAVERN_HOSTWHITELIST_ENABLED
  value: 'true'
- name: SILLYTAVERN_HOSTWHITELIST_HOSTS
  value: '["sillytavern.fiora.li"]'
ingress:
  enabled: true
volumeMounts:
- name: sillytavern-persistent-storage
  mountPath: /app/data
  subPath: data/data
- name: tmp
  mountPath: /home/node/app/config
  subPath: config
- name: tmp
  mountPath: /home/node/app/extensions
  subPath: extensions
- name: tmp
  mountPath: /home/node/app/plugins
  subPath: plugins
- name: tmp
  mountPath: /home/node/app/public/error
  subPath: error
- name: tmp
  mountPath: /home/node/app/backups
  subPath: backups
- name: tmp
  mountPath: /home/node/app/public/scripts/extensions/third-party
  subPath: exports
volumes:
- name: sillytavern-persistent-storage
  persistentVolumeClaim:
    claimName: sillytavern
- name: tmp
  emptyDir: {}
networkpolicy:
  ingress:
    internal: true
  egress:
    network: true
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  privileged: false
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
volume:
  enabled: true
  size: "1073741824"
imageUpdater:
  enabled: true
externalSecrets:
  - name: sillytavern-credentials
    data:
      - secretKey: BASICAUTHUSER_USERNAME
        remoteRef:
          key: /homelab/sillytavern/BASICAUTHUSER_USERNAME
      - secretKey: BASICAUTHUSER_PASSWORD
        remoteRef:
          key: /homelab/sillytavern/BASICAUTHUSER_PASSWORD
